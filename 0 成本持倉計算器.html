<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0 成本 Calculator</title>
    <style>
        :root {
            --bg: #0a0a0c; --card: #16161e; --text: #e2e8f0;
            --muted: #94a3b8; --line: #2d2d3d; --green: #2ecc71; --blue: #3498db; --red: #e74c3c;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2rem; border-radius: 20px; border: 1px solid var(--line); box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; box-sizing: border-box; }
        h2 { color: var(--text); text-align: center; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--muted); font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 1rem; box-sizing: border-box; background: #0f0f15; color: var(--text); }
        input:focus { outline: 3px solid rgba(52, 152, 219, 0.28); border-color: var(--blue); }
        .result-box { background: #0f1720; border-left: 5px solid var(--blue); padding: 1rem; margin-top: 1.5rem; border-radius: 8px; }
        .result-item { margin: 10px 0; font-size: 1.1rem; }
        .highlight { font-weight: bold; color: var(--red); }
        .remain { color: var(--green); font-weight: bold; }
        .note { font-size: 0.85rem; color: var(--muted); line-height: 1.4; }
        .timer-button { display: block; margin-top: 1.25rem; padding: 12px 14px; border-radius: 8px; background: var(--green); color: #06120a; text-align: center; text-decoration: none; font-weight: 700; transition: transform 0.2s, filter 0.2s; }
        .timer-button:hover { transform: translateY(-1px); filter: brightness(1.08); }
        .timer-button:focus-visible { outline: 3px solid rgba(46, 204, 113, 0.45); outline-offset: 3px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📈 0 成本持倉計算器</h2>
    
    <div class="input-group">
        <label>股價升幅 (%)</label>
        <input type="number" id="profitPct" placeholder="例如：50" oninput="calculate()">
    </div>

    <div class="result-box">
        <div class="result-item">
            應賣出倉位：<span id="sellPct" class="highlight">0</span> <span class="highlight">%</span>
        </div>
        <div class="result-item">
            剩餘零成本持倉：<span id="remainPct" class="remain">0</span> <span class="remain">%</span>
        </div>
    </div>

    <p class="note">
        * 公式：賣出 % = 1 / (1 + 升幅%)<br>
        * 建議操作時預留少許空間作手續費。
    </p>

    <a class="timer-button" href="./index.html">返回 US TIMER</a>
</div>

<script>
    function calculate() {
        const r = parseFloat(document.getElementById('profitPct').value) / 100;
        const sellDisplay = document.getElementById('sellPct');
        const remainDisplay = document.getElementById('remainPct');

        if (isNaN(r) || r <= 0) {
            sellDisplay.innerText = "0";
            remainDisplay.innerText = "0";
            return;
        }

        // 賣出比例 X = 1 / (1 + r)
        const sellRatio = (1 / (1 + r)) * 100;
        const remainRatio = 100 - sellRatio;

        sellDisplay.innerText = sellRatio.toFixed(2);
        remainDisplay.innerText = remainRatio.toFixed(2);
    }
</script>

</body>
</html>
